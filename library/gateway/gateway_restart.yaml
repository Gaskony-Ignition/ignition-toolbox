name: "Gateway Restart"
version: "3.0"
description: "Restart Ignition Gateway from notification banner (assumes already logged in)"
domain: gateway
group: "Gateway (Base Playbooks)"
verified: true

parameters:
  - name: gateway_url
    type: string
    required: true
    description: "Gateway URL (e.g., http://localhost:8088)"

  - name: username
    type: string
    required: false
    description: "Gateway admin username (not used, kept for compatibility)"

  - name: password
    type: string
    required: false
    description: "Gateway admin password (not used, kept for compatibility)"

steps:
  # ==========================================================================
  # STEP 1: Navigate to Gateway Config Page (Ensure Banner is Visible)
  # NOTE: After module install/uninstall the page may be in an unknown state.
  #       Navigating to a config page ensures the multi-banner bar is loaded.
  # ==========================================================================
  - id: step1_navigate_to_config
    name: "Step 1: Navigate to Gateway Config Page"
    type: browser.navigate
    parameters:
      url: "{{ parameter.gateway_url }}/app/platform/system/modules"
      wait_for: "load"
      timeout: 30

  - id: step2_wait_for_page_load
    name: "Step 2: Wait for Page to Fully Load"
    type: utility.sleep
    parameters:
      seconds: 3

  # ==========================================================================
  # STEP 3: Screenshot Banner State (Diagnostic)
  # ==========================================================================
  - id: step3_screenshot_banner_state
    name: "Step 3: Screenshot - Banner State"
    type: browser.screenshot
    parameters:
      name: "restart_banner_state"
      full_page: false

  # ==========================================================================
  # STEP 4: Check if Restart Banner is Already Visible
  # NOTE: Ignition 8.3.x uses a multi-banner (<ul data-component="web-ui.multi-banner">).
  #       When multiple banners exist (trial + restart), one is active and others
  #       are collapsed with a small expand button (e.g. button#expand-restart-required-banner).
  #       The restart banner has id="restart-required-banner".
  # ==========================================================================
  - id: step4_check_restart_banner_visible
    name: "Step 4: Check if Restart Banner is Visible"
    type: browser.verify
    parameters:
      selector: '#restart-required-banner:not(.collapsed) button[data-label="Restart Gateway"], #restart-required-banner:not(.collapsed) button:has-text("Restart Gateway")'
      state: "visible"
      timeout: 5000
    on_failure: continue

  # ==========================================================================
  # STEP 5: If Restart Banner is Collapsed, Expand It
  # NOTE: When the trial banner has priority, the restart banner collapses to
  #       a small icon button (button#expand-restart-required-banner) with a
  #       warning SVG. Click it to switch the active banner to restart.
  # ==========================================================================
  - id: step5_expand_restart_banner
    name: "Step 5: Expand Restart Banner (if collapsed)"
    type: browser.click
    parameters:
      selector: 'button#expand-restart-required-banner, #restart-required-banner.collapsed button, [data-component="web-ui.multi-banner"] li.collapsed button'
      timeout: 5000
      force: true
    on_failure: continue

  - id: step6_wait_for_banner_switch
    name: "Step 6: Wait for Banner to Switch"
    type: utility.sleep
    parameters:
      seconds: 1

  # ==========================================================================
  # STEP 7: Click Restart Gateway Button in Banner
  # NOTE: The button is inside #restart-required-banner with
  #       data-label="Restart Gateway" and data-component="web-ui.button"
  # ==========================================================================
  - id: step7_click_restart_button
    name: "Step 7: Click Restart Gateway Button"
    type: browser.click
    parameters:
      selector: 'button[data-label="Restart Gateway"], #restart-required-banner button:has-text("Restart Gateway"), button:has-text("Restart Gateway")'
      timeout: 30000
      force: true

  # ==========================================================================
  # STEP 8: Wait for Confirmation Dialog
  # ==========================================================================
  - id: step8_wait_for_dialog
    name: "Step 8: Wait for Confirmation Dialog"
    type: utility.sleep
    parameters:
      seconds: 2

  # ==========================================================================
  # STEP 9: Screenshot Confirmation Dialog
  # ==========================================================================
  - id: step9_screenshot_dialog
    name: "Step 9: Screenshot - Confirmation Dialog"
    type: browser.screenshot
    parameters:
      name: "restart_confirmation_dialog"
      full_page: false

  # ==========================================================================
  # STEP 10: Click I understand the risks Checkbox
  # NOTE: Uses generic checkbox selector as fallback — text labels may change between Ignition versions
  # ==========================================================================
  - id: step10_click_checkbox
    name: "Step 10: Click I understand the risks"
    type: browser.click
    parameters:
      selector: 'label:has-text("I understand the risks"), :text("I understand the risks"), input[type="checkbox"], [role="checkbox"]'
      timeout: 30000
      force: true

  # ==========================================================================
  # STEP 11: Wait for Restart Gateway Button to Enable
  # ==========================================================================
  - id: step11_wait_for_button_enable
    name: "Step 11: Wait for Restart Gateway Button to Enable"
    type: utility.sleep
    parameters:
      seconds: 1

  # ==========================================================================
  # STEP 12: Click Restart Gateway Button in Confirmation Dialog
  # ==========================================================================
  - id: step12_click_restart_in_dialog
    name: "Step 12: Click Restart Gateway Button in Dialog"
    type: browser.click
    parameters:
      selector: 'button[id="restart gateway-button"], button[data-label="Restart Gateway"]:not([disabled]), button:has-text("Restart Gateway"):not([disabled])'
      timeout: 30000
      force: true

  # ==========================================================================
  # STEP 13: Confirm Gateway is Restarting (Goes Offline)
  # ==========================================================================
  - id: step13_confirm_offline
    name: "Step 13: Confirm Gateway is Restarting"
    type: utility.python
    parameters:
      script: |
        import time
        import httpx

        gateway_url = r"""{{ parameter.gateway_url }}"""
        gateway_timeout = timeout_overrides.get("gateway_restart", 120)
        wait_seconds = 3
        max_attempts = max(1, gateway_timeout // wait_seconds)

        print(f"Waiting for Gateway to go offline (confirming restart started)...")
        print(f"Max attempts: {max_attempts}, interval: {wait_seconds}s")
        print("=" * 60)

        for attempt in range(1, max_attempts + 1):
            try:
                response = httpx.get(gateway_url, timeout=10.0, follow_redirects=True)
                print(f"✗ Attempt {attempt}/{max_attempts}: Gateway still online (Status: {response.status_code})")
            except Exception as e:
                print(f"✓ Attempt {attempt}/{max_attempts}: Gateway is offline! Restart confirmed.")
                set_variable('restart_confirmed', 'true')
                break

            if attempt < max_attempts:
                time.sleep(wait_seconds)
        else:
            print("ERROR: Gateway did not go offline - restart may have failed")
            set_variable('restart_confirmed', 'false')
            raise Exception("Step failed")

        print("=" * 60)
        print(f"Gateway went offline after {attempt * wait_seconds}s - restart in progress")

  # ==========================================================================
  # STEP 14: Poll Gateway Until Online
  # ==========================================================================
  - id: step14_poll_gateway
    name: "Step 14: Poll Gateway Until Online"
    type: utility.python
    parameters:
      script: |
        import time
        import httpx

        gateway_url = r"""{{ parameter.gateway_url }}"""
        gateway_timeout = timeout_overrides.get("gateway_restart", 120)
        wait_seconds = 5
        max_attempts = max(1, gateway_timeout // wait_seconds)

        print(f"Polling {gateway_url} until it comes back online...")
        print(f"Max attempts: {max_attempts}, interval: {wait_seconds}s")
        print("=" * 60)

        for attempt in range(1, max_attempts + 1):
            try:
                response = httpx.get(gateway_url, timeout=10.0, follow_redirects=True)
                if response.status_code == 200:
                    print(f"✓ Attempt {attempt}/{max_attempts}: Gateway is online! (Status: {response.status_code})")
                    set_variable('gateway_online', 'true')
                    set_variable('attempts_needed', str(attempt))
                    break
                else:
                    print(f"✗ Attempt {attempt}/{max_attempts}: Gateway responded but not ready (Status: {response.status_code})")
            except Exception as e:
                print(f"✗ Attempt {attempt}/{max_attempts}: Gateway not responding - {type(e).__name__}")

            if attempt < max_attempts:
                time.sleep(wait_seconds)
        else:
            print("ERROR: Gateway did not come back online within the timeout period")
            set_variable('gateway_online', 'false')
            raise Exception("Step failed")

        print("=" * 60)
        print(f"Gateway online after {attempt} attempts ({attempt * wait_seconds}s)")

  # ==========================================================================
  # STEP 15: Wait After Gateway Online (Extended for Auth System Initialization)
  # ==========================================================================
  - id: step15_wait_after_online
    name: "Step 15: Wait After Gateway Online (15s for auth initialization)"
    type: utility.sleep
    parameters:
      seconds: 15

  # ==========================================================================
  # STEP 16: Verify Home Page Access (No Login Required)
  # ==========================================================================
  - id: step16_verify_home_page
    name: "Step 16: Verify Home Page Access"
    type: browser.navigate
    parameters:
      url: "{{ parameter.gateway_url }}"
      wait_for: "load"
      timeout: 30

  # ==========================================================================
  # STEP 17: Screenshot Home Page
  # ==========================================================================
  - id: step17_screenshot_home
    name: "Step 17: Screenshot Home Page"
    type: browser.screenshot
    parameters:
      name: "after_restart_home_page"
      full_page: true

  # ==========================================================================
  # STEP 18: Verify Gateway is Accessible
  # ==========================================================================
  - id: step18_verify_accessible
    name: "Step 18: Verify Gateway is Accessible"
    type: browser.verify
    parameters:
      selector: ".home-page, .ia_homePage, [data-page='home'], nav, form, [class*='login'], [class*='Login'], main, #app"
      state: "visible"
      timeout: 15000
    on_failure: continue

  # ==========================================================================
  # STEP 19: Execution Summary
  # ==========================================================================
  - id: step19_summary
    name: "Step 19: Execution Summary"
    type: utility.python
    parameters:
      script: |
        print("=" * 80)
        print("GATEWAY RESTART SUMMARY")
        print("=" * 80)
        print(f"Gateway URL: {{ parameter.gateway_url }}")
        print(f"Restart Confirmed: {get_variable('restart_confirmed')}")
        print(f"Gateway Online: {get_variable('gateway_online')}")
        print(f"Attempts to Come Online: {get_variable('attempts_needed')}")
        print(f"")
        print(f"Gateway has been restarted successfully and is now accessible")
        print(f"Waited 15s after online for authentication system initialization")
        print("=" * 80)
