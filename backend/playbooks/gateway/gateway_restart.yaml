name: "Gateway Restart"
version: "3.4"
description: "Restart Ignition Gateway from notification banner (assumes already logged in)"
domain: gateway
group: "Gateway (Base Playbooks)"
verified: true

parameters:
  - name: gateway_url
    type: string
    required: true
    description: "Gateway URL (e.g., http://localhost:8088)"

  - name: username
    type: string
    required: false
    description: "Gateway admin username (not used, kept for compatibility)"

  - name: password
    type: string
    required: false
    description: "Gateway admin password (not used, kept for compatibility)"

steps:
  # ==========================================================================
  # STEP 1: Screenshot Current Page State (Diagnostic)
  # NOTE: This playbook assumes the browser is already logged in and on a
  #       config page (e.g. modules). It does NOT navigate — navigating would
  #       reload the page and lose the authenticated session.
  # ==========================================================================
  - id: step1_screenshot_banner_state
    name: "Step 1: Screenshot - Banner State"
    type: browser.screenshot
    parameters:
      name: "restart_banner_state"
      full_page: false

  # ==========================================================================
  # STEP 2: Check if Restart Banner is Already Visible (not collapsed)
  # NOTE: Ignition 8.3.x uses a multi-banner (<ul data-component="web-ui.multi-banner">).
  #       When multiple banners exist (trial + restart), one is active and others
  #       are collapsed with a small expand button (e.g. button#expand-restart-required-banner).
  #       The restart banner has id="restart-required-banner".
  # ==========================================================================
  - id: step2_check_restart_banner_visible
    name: "Step 2: Check if Restart Banner is Visible"
    type: browser.verify_state
    parameters:
      selector: 'button[data-label="Restart Gateway"], button:has-text("Restart Gateway"), button:has-text("Restart"), button:has-text("RESTART")'
      state: "visible"
      timeout: 5000
    on_failure: continue

  # ==========================================================================
  # STEP 3: If Restart Banner is Collapsed, Expand It
  # NOTE: When the trial banner has priority, the restart banner collapses to
  #       a small icon button (button#expand-restart-required-banner) with a
  #       warning SVG. Click it to switch the active banner to restart.
  # ==========================================================================
  - id: step3_expand_restart_banner
    name: "Step 3: Expand Restart Banner (if collapsed)"
    type: browser.click
    parameters:
      selector: 'button#expand-restart-required-banner, #restart-required-banner.collapsed button, [data-component="web-ui.multi-banner"] li.collapsed button'
      timeout: 5000
      force: true
    on_failure: continue

  - id: step4_wait_for_banner_switch
    name: "Step 4: Wait for Banner to Switch"
    type: utility.sleep
    parameters:
      seconds: 1

  # ==========================================================================
  # STEP 5: Click Restart Gateway Button in Banner
  # NOTE: Uses broad selectors to match across Ignition versions:
  #       - data-label attribute (8.3.x)
  #       - text matching (all versions)
  # ==========================================================================
  - id: step5_click_restart_button
    name: "Step 5: Click Restart Gateway Button"
    type: browser.click
    parameters:
      selector: 'button[data-label="Restart Gateway"], #restart-required-banner button:has-text("Restart Gateway"), button:has-text("Restart Gateway"), button:has-text("Restart"), a:has-text("Restart Gateway")'
      timeout: 30000
      force: true

  # ==========================================================================
  # STEP 6: Wait for Confirmation Dialog
  # ==========================================================================
  - id: step6_wait_for_dialog
    name: "Step 6: Wait for Confirmation Dialog"
    type: utility.sleep
    parameters:
      seconds: 2

  # ==========================================================================
  # STEP 7: Screenshot Confirmation Dialog
  # ==========================================================================
  - id: step7_screenshot_dialog
    name: "Step 7: Screenshot - Confirmation Dialog"
    type: browser.screenshot
    parameters:
      name: "restart_confirmation_dialog"
      full_page: false

  # ==========================================================================
  # STEP 8: Click "I understand the risks" Checkbox in Dialog
  # NOTE: Ignition 8.3.3 uses MUI checkbox with id="confirm-restart" inside
  #       the confirm-restart-modal dialog. Must click the label wrapper to
  #       properly toggle the MUI checkbox state.
  # ==========================================================================
  - id: step8_click_checkbox
    name: "Step 8: Click I understand the risks"
    type: browser.click
    parameters:
      selector: '#confirm-restart-modal label:has-text("I understand the risks"), #confirm-restart-modal [data-component="web-ui.checkbox"] label, label[data-label="I understand the risks and would like to proceed."]'
      timeout: 30000

  # ==========================================================================
  # STEP 9: Wait for Restart Gateway Button to Enable
  # ==========================================================================
  - id: step9_wait_for_button_enable
    name: "Step 9: Wait for Restart Gateway Button to Enable"
    type: browser.wait
    parameters:
      selector: 'button[id="restart gateway-button"]:not([disabled])'
      timeout: 10000

  # ==========================================================================
  # STEP 10: Click Restart Gateway Button in Confirmation Dialog
  # NOTE: Button id="restart gateway-button" is generated by IgnitionWebUi
  #       Modal component as primaryText.toLowerCase() + "-button".
  #       Must NOT use force:true — button must be enabled (checkbox checked).
  # ==========================================================================
  - id: step10_click_restart_in_dialog
    name: "Step 10: Click Restart Gateway Button in Dialog"
    type: browser.click
    parameters:
      selector: 'button[id="restart gateway-button"]'
      timeout: 30000

  # ==========================================================================
  # STEP 11: Confirm Gateway is Restarting (Goes Offline)
  # ==========================================================================
  - id: step11_confirm_offline
    name: "Step 11: Confirm Gateway is Restarting"
    type: utility.python
    parameters:
      script: |
        import time
        import httpx

        gateway_url = r"""{{ parameter.gateway_url }}"""
        gateway_timeout = timeout_overrides.get("gateway_restart", 120)
        wait_seconds = 3
        max_attempts = max(1, gateway_timeout // wait_seconds)

        print(f"Waiting for Gateway to go offline (confirming restart started)...")
        print(f"Max attempts: {max_attempts}, interval: {wait_seconds}s")
        print("=" * 60)

        for attempt in range(1, max_attempts + 1):
            try:
                response = httpx.get(gateway_url, timeout=10.0, follow_redirects=True)
                print(f"✗ Attempt {attempt}/{max_attempts}: Gateway still online (Status: {response.status_code})")
            except Exception as e:
                print(f"✓ Attempt {attempt}/{max_attempts}: Gateway is offline! Restart confirmed.")
                set_variable('restart_confirmed', 'true')
                break

            if attempt < max_attempts:
                time.sleep(wait_seconds)
        else:
            print("ERROR: Gateway did not go offline - restart may have failed")
            set_variable('restart_confirmed', 'false')
            raise Exception("Step failed")

        print("=" * 60)
        print(f"Gateway went offline after {attempt * wait_seconds}s - restart in progress")

  # ==========================================================================
  # STEP 12: Poll Gateway Until Online
  # ==========================================================================
  - id: step12_poll_gateway
    name: "Step 12: Poll Gateway Until Online"
    type: utility.python
    parameters:
      script: |
        import time
        import httpx

        gateway_url = r"""{{ parameter.gateway_url }}"""
        gateway_timeout = timeout_overrides.get("gateway_restart", 120)
        wait_seconds = 5
        max_attempts = max(1, gateway_timeout // wait_seconds)

        print(f"Polling {gateway_url} until it comes back online...")
        print(f"Max attempts: {max_attempts}, interval: {wait_seconds}s")
        print("=" * 60)

        for attempt in range(1, max_attempts + 1):
            try:
                response = httpx.get(gateway_url, timeout=10.0, follow_redirects=True)
                if response.status_code == 200:
                    print(f"✓ Attempt {attempt}/{max_attempts}: Gateway is online! (Status: {response.status_code})")
                    set_variable('gateway_online', 'true')
                    set_variable('attempts_needed', str(attempt))
                    break
                else:
                    print(f"✗ Attempt {attempt}/{max_attempts}: Gateway responded but not ready (Status: {response.status_code})")
            except Exception as e:
                print(f"✗ Attempt {attempt}/{max_attempts}: Gateway not responding - {type(e).__name__}")

            if attempt < max_attempts:
                time.sleep(wait_seconds)
        else:
            print("ERROR: Gateway did not come back online within the timeout period")
            set_variable('gateway_online', 'false')
            raise Exception("Step failed")

        print("=" * 60)
        print(f"Gateway online after {attempt} attempts ({attempt * wait_seconds}s)")

  # ==========================================================================
  # STEP 13: Wait After Gateway Online (Extended for Auth System Initialization)
  # ==========================================================================
  - id: step13_wait_after_online
    name: "Step 13: Wait After Gateway Online (15s for auth initialization)"
    type: utility.sleep
    parameters:
      seconds: 15

  # ==========================================================================
  # STEP 14: Verify Home Page Access (No Login Required)
  # ==========================================================================
  - id: step14_verify_home_page
    name: "Step 14: Verify Home Page Access"
    type: browser.navigate
    parameters:
      url: "{{ parameter.gateway_url }}"
      wait_until: "load"

  # ==========================================================================
  # STEP 15: Screenshot Home Page
  # ==========================================================================
  - id: step15_screenshot_home
    name: "Step 15: Screenshot Home Page"
    type: browser.screenshot
    parameters:
      name: "after_restart_home_page"
      full_page: true

  # ==========================================================================
  # STEP 16: Verify Gateway is Accessible
  # ==========================================================================
  - id: step16_verify_accessible
    name: "Step 16: Verify Gateway is Accessible"
    type: browser.verify_state
    parameters:
      selector: ".home-page, .ia_homePage, [data-page='home'], nav, form, [class*='login'], [class*='Login'], main, #app"
      state: "visible"
      timeout: 15000
    on_failure: continue

  # ==========================================================================
  # STEP 17: Execution Summary
  # ==========================================================================
  - id: step17_summary
    name: "Step 17: Execution Summary"
    type: utility.python
    parameters:
      script: |
        print("=" * 80)
        print("GATEWAY RESTART SUMMARY")
        print("=" * 80)
        print(f"Gateway URL: {{ parameter.gateway_url }}")
        print(f"Restart Confirmed: {get_variable('restart_confirmed')}")
        print(f"Gateway Online: {get_variable('gateway_online')}")
        print(f"Attempts to Come Online: {get_variable('attempts_needed')}")
        print(f"")
        print(f"Gateway has been restarted successfully and is now accessible")
        print(f"Waited 15s after online for authentication system initialization")
        print("=" * 80)
